name: re-caRing Deploy

on:
  workflow_dispatch: # 수동
  pull_request: # 자동
    branches:
      - develop
    types:
      - closed

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    environment: dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew clean test

      - name: Build
        run: ./gradlew clean build -x test

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker Build & Push to ECR
        env:
          ECR_IMAGE: 757052694924.dkr.ecr.ap-northeast-2.amazonaws.com/re-caring-api:${{ env.SHORT_SHA }}
        run: |
          docker build -t $ECR_IMAGE .
          docker push $ECR_IMAGE

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition recaring-task \
            --query taskDefinition > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: recaring
          image: 757052694924.dkr.ecr.ap-northeast-2.amazonaws.com/re-caring-api:${{ env.SHORT_SHA }}
          environment-variables: "SPRING_PROFILES_ACTIVE=prod"

      - name: Rolling deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: recaring-service
          cluster: recaring-cluster
          wait-for-service-stability: true

      - name: Get EC2 instance ID
        id: ec2
        run: |
          ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Name,Values=recaring-app-server" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          echo "id=$ID" >> $GITHUB_OUTPUT

      - name: Deploy config files and reload nginx via SSM
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/recaring && git fetch origin develop && git pull origin develop",
              "sudo chown -R ubuntu:ubuntu /home/ubuntu/recaring/",
              "chmod +x /home/ubuntu/recaring/scripts/deploy.sh",
              "bash /home/ubuntu/recaring/scripts/deploy.sh"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.id }}"

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ steps.ec2.outputs.id }}" \
            --query "{status: StatusDetails, stdout: StandardOutputContent, stderr: StandardErrorContent}" \
            --output json

      - name: Notify Discord (배포 성공)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHORT_SHA: ${{ env.SHORT_SHA }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"✅ 배포 성공\",\"description\":\"$PR_TITLE\",\"color\":5763719,\"fields\":[{\"name\":\"브랜치\",\"value\":\"$BRANCH\",\"inline\":true},{\"name\":\"커밋\",\"value\":\"$SHORT_SHA\",\"inline\":true},{\"name\":\"배포자\",\"value\":\"$ACTOR\",\"inline\":true}]}]}"

      - name: Notify Discord (배포 실패)
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHORT_SHA: ${{ env.SHORT_SHA }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"❌ 배포 실패\",\"description\":\"$PR_TITLE\",\"color\":15548997,\"fields\":[{\"name\":\"브랜치\",\"value\":\"$BRANCH\",\"inline\":true},{\"name\":\"커밋\",\"value\":\"$SHORT_SHA\",\"inline\":true},{\"name\":\"배포자\",\"value\":\"$ACTOR\",\"inline\":true}]}]}"
