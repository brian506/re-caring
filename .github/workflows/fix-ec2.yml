name: Fix EC2 (one-off)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Fix ECS agent and install node_exporter
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 120s
          script: |
            echo "=== Stopping conflicting containers ==="
            docker stop node-exporter 2>/dev/null || true
            docker rm node-exporter 2>/dev/null || true
            docker stop ecs-agent 2>/dev/null || true
            docker rm ecs-agent 2>/dev/null || true

            echo "=== Disk & Docker info ==="
            df -h /var/lib/docker
            docker info 2>&1 | grep -E "Storage|Total|Free|Images|Containers"

            echo "=== Clearing ECS agent state ==="
            sudo systemctl stop ecs 2>/dev/null || true
            sudo rm -f /var/lib/ecs/data/ecs_agent_data.json
            sudo rm -f /var/cache/ecs/ecs-agent.tar
            docker system prune -f 2>/dev/null || true

            echo "=== Pulling ECS agent image ==="
            ECS_IMAGE=$(cat /etc/ecs/ecs.config 2>/dev/null | grep ECS_AGENT_DOCKER_IMAGE || echo "amazon/amazon-ecs-agent:latest")
            docker pull amazon/amazon-ecs-agent:latest 2>&1 | tail -3

            echo "=== Starting ECS agent ==="
            sudo systemctl start ecs
            sleep 5

            echo "=== ECS agent container logs ==="
            docker logs ecs-agent 2>&1 | tail -15 || echo "(no ecs-agent container)"

            sleep 10
            sudo systemctl status ecs --no-pager | head -6

            echo "=== ECS init journal (last errors) ==="
            sudo journalctl -u ecs --since "2 minutes ago" --no-pager 2>&1 | grep -i "error\|fail\|exit\|level=error" | tail -10

            echo "=== Installing node_exporter as systemd service ==="
            if ! command -v node_exporter &>/dev/null; then
              cd /tmp
              wget -q https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
              tar xf node_exporter-1.8.2.linux-amd64.tar.gz
              sudo mv node_exporter-1.8.2.linux-amd64/node_exporter /usr/local/bin/
              rm -rf node_exporter-1.8.2.linux-amd64*
            fi

            sudo tee /etc/systemd/system/node_exporter.service > /dev/null <<'EOF'
            [Unit]
            Description=Node Exporter
            After=network.target

            [Service]
            ExecStart=/usr/local/bin/node_exporter
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable --now node_exporter
            sleep 3
            sudo systemctl status node_exporter --no-pager | head -5
            echo "=== Done ==="
