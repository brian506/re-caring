name: Fix EC2 (one-off)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Remove systemd node_exporter and restart docker-compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 120s
          script: |
            echo "=== Removing systemd node_exporter (migrating to docker-compose) ==="
            sudo systemctl disable --now node_exporter 2>/dev/null || true
            sudo rm -f /etc/systemd/system/node_exporter.service
            sudo rm -f /usr/local/bin/node_exporter
            sudo systemctl daemon-reload

            echo "=== Restarting docker-compose with updated config ==="
            cd /home/ubuntu/recaring
            docker compose -f docker-compose-dev.yml pull node-exporter
            docker compose -f docker-compose-dev.yml up -d node-exporter prometheus

            sleep 5
            docker compose -f docker-compose-dev.yml ps node-exporter prometheus
            echo "=== Done ==="
