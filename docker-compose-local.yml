services:

  postgres:
    image: postgres:16-alpine
    container_name: recaring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recaring
      POSTGRES_USER: recaring
      POSTGRES_PASSWORD: recaring
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    networks:
      - recaring-local

  redis:
    image: redis:7-alpine
    container_name: recaring-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "6379:6379"
    networks:
      - recaring-local

  prometheus:
    image: prom/prometheus:latest
    container_name: recaring-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./monitoring/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-local-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - recaring-local

  grafana:
    image: grafana/grafana:latest
    container_name: recaring-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      TZ: Asia/Seoul
    volumes:
      - grafana-local-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - recaring-local

volumes:
  prometheus-local-data:
  grafana-local-data:

networks:
  recaring-local:
    driver: bridge
