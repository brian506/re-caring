global:
  scrape_interval: 15s
  scrape_timeout: 14s

scrape_configs:
  - job_name: recaring
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['spring-app.recaring.local:8080']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
