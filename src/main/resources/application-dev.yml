spring:
  config:
    activate:
      on-profile: dev

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096

  datasource:
      driver-class-name: org.postgresql.Driver
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

jwt:
  secret-key: ${JWT_KEY}
  access:
    expiration: 3600000
    header: Authorization
  refresh:
    expiration: 1209600000
    header: Authorization-refresh

coolsms:
  api-key: ${COOLSMS_API_KEY}
  api-secret: ${COOLSMS_API_SECRET}
  sender: ${COOLSMS_SENDER}

client:
  url: re-caring.com

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION:ap-northeast-2}
  sqs:
    gps-queue-url: ${AWS_SQS_GPS_QUEUE_URL}

gps:
  pattern:
    analysis:
      interval-ms: ${GPS_PATTERN_INTERVAL_MS:1800000}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html
  api-docs:
    enabled: true

alert:
  webhook:
    secret: ${ALERT_WEBHOOK_SECRET}
  slack:
    bot-token: ${SLACK_BOT_TOKEN}
    signing-secret: ${SLACK_SIGNING_SECRET}
    channel-id: ${SLACK_CHANNEL_ID}
  github:
    token: ${GITHUB_TOKEN}
    owner: ${GITHUB_OWNER}
    repo: ${GITHUB_REPO}
  prometheus:
    base-url: ${PROMETHEUS_BASE_URL}
  aws:
    ssm:
      instance-tag: recaring-app-server
