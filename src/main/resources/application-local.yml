spring:
  config:
    activate:
      on-profile: local

  datasource:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/recaring
      username: recaring
      password: recaring

  jpa:
    hibernate:
      ddl-auto: create
      database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

redis:
  host: localhost
  port: 6379

jwt:
  secret-key: local-secret-key-must-be-at-least-32-characters-long
  access:
    expiration: 3600000
    header: Authorization
  refresh:
    expiration: 1209600000
    header: Authorization-refresh

coolsms:
  api-key: local
  api-secret: local
  sender: local

client:
  url: http://localhost:3000

aws:
  sqs:
    gps-queue-url: ""

gps:
  pattern:
    analysis:
      interval-ms: 1800000

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  swagger-ui:
    url: /v3/api-docs
    path: /v3/api-docs
    disable-swagger-default-url: true
  api-docs:
    enabled: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
