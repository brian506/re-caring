spring:
  config:
    activate:
      on-profile: local

  datasource:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5432/recaring
      username: recaring
      password: recaring

  jpa:
    hibernate:
      ddl-auto: create
      database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true

redis:
  host: localhost
  port: 6379

jwt:
  secret-key: local-secret-key-must-be-at-least-32-characters-long
  access:
    expiration: 3600000
    header: Authorization
  refresh:
    expiration: 1209600000
    header: Authorization-refresh

coolsms:
  api-key: local
  api-secret: local
  sender: local

client:
  url: http://localhost:3000
