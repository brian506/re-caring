spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

coolsms:
  api-key: ${COOLSMS_API_KEY}
  api-secret: ${COOLSMS_API_SECRET}
  sender: ${COOLSMS_SENDER}

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access:
    expiration: 1800000       # 30분 (ms)
  refresh:
    expiration: 1209600000    # 14일 (ms)
